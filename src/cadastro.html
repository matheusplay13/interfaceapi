<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Cliente - Sistema de Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Cadastrar Novo Cliente</h1>
  </header>

  <main>
    <div class="cadastro-container">
      <div class="form-cadastro">
        <form id="form-cadastro" onsubmit="cadastrarCliente(event)">
          <div class="form-group">
            <label for="cpf-cadastro">CPF *</label>
            <input type="text" id="cpf-cadastro" maxlength="14" placeholder="Ex: 123.456.789-00" required>
          </div>
          <div class="form-group">
            <label for="nome-cadastro">Nome *</label>
            <input type="text" id="nome-cadastro" placeholder="Nome completo" required>
          </div>
          <div class="form-group">
            <label for="idade-cadastro">Idade *</label>
            <input type="number" id="idade-cadastro" min="1" max="120" placeholder="Ex: 25" required>
          </div>
          <div class="form-group">
            <label for="endereco-cadastro">Endereço *</label>
            <input type="text" id="endereco-cadastro" placeholder="Rua, número, complemento" required>
          </div>
          <div class="form-group">
            <label for="bairro-cadastro">Bairro *</label>
            <input type="text" id="bairro-cadastro" placeholder="Bairro" required>
          </div>
          <div class="form-group">
            <label for="contato-cadastro">Contato *</label>
            <input type="text" id="contato-cadastro" placeholder="Telefone ou e-mail" required>
          </div>
          <div class="form-buttons">
            <button type="submit" class="btn-salvar">Cadastrar Cliente</button>
            <button type="button" class="btn-voltar" onclick="voltarParaInicio()">Voltar para Início</button>
          </div>
        </form>
      </div>
      
      <div id="resultado-cadastro"></div>
      <div id="erro" class="erro hidden"></div>
    </div>
  </main>

  <script src="cadastro.js"></script>
</body>

</html>
