<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca de Clientes</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <header>
    <div class="header-content">
      <h1>Sistema de Busca de Clientes</h1>
      <div class="user-menu">
        <div class="user-info">
          <span id="user-name">Carregando...</span>
        </div>
        <button id="btn-logout" class="btn-logout" onclick="fazerLogout()">
          <span class="logout-icon">Sair</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="botoes-principais">
      <button id="btn-todos" onclick="buscarTodosClientes()">Buscar Todos os Clientes</button>
      <button id="btn-cadastrar" onclick="window.location.href='cadastro-cliente.html'" style="background: #27ae60;">Cadastrar Novo Cliente</button>
      <button id="btn-testar" onclick="testarConexaoAPI()" style="background: #f39c12;">Testar Conexão</button>
    </div>
    
    <div class="busca-cpf">
      <label for="cpf">Digite o CPF para busca específica:</label><br>
      <input type="text" id="cpf" maxlength="14" placeholder="Ex: 123.456.789-00" />
      <button id="btn-cpf" onclick="buscarClientePorCpf()">Buscar por CPF</button>
    </div>
    
    <div id="resultado"></div>
    <div id="erro" class="erro hidden"></div>
  </main>

  <script src="../js/script.js"></script>
</body>

</html>
