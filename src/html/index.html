<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca de Clientes</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <header>
    <div class="header-content">
      <h1>Sistema de Busca de Clientes</h1>
      <div class="user-menu">
        <div class="user-info">
          <span id="user-name">Carregando...</span>
        </div>
        <button id="btn-logout" class="btn-logout" onclick="fazerLogout()">
          <span class="logout-icon">Sair</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Seção Principal de Ações -->
    <section class="dashboard-section">
      <h2 class="section-title">Painel de Controle</h2>
      
      <!-- Grupo de Operações Principais -->
      <div class="action-group">
        <h3 class="group-title">Operações Principais</h3>
        <div class="botoes-principais">
          <button id="btn-todos" onclick="buscarTodosClientes()">Buscar Todos os Clientes</button>
          <button id="btn-mostrar-produtos" onclick="buscarTodosProdutos()">Mostrar Todos os Produtos</button>
          <button id="btn-deletar" onclick="mostrarPainelDeletar()">Deletar Registro</button>
        </div>
      </div>
      
      <!-- Grupo de Cadastros -->
      <div class="action-group">
        <h3 class="group-title">Cadastros</h3>
        <div class="botoes-cadastro">
          <button id="btn-cadastrar" onclick="window.location.href='cadastro-cliente.html'">Cadastrar Novo Cliente</button>
          <button id="btn-produto" onclick="window.location.href='cadastro-produto.html'">Cadastrar Novo Produto</button>
        </div>
      </div>
      
      <!-- Grupo de Sistema -->
      <div class="action-group">
        <h3 class="group-title">Sistema</h3>
        <div class="botoes-sistema">
          <button id="btn-testar" onclick="testarConexaoAPI()">Testar Conexão</button>
        </div>
      </div>
    </section>
    
    <!-- Seção de Buscas -->
    <section class="search-section">
      <h2 class="section-title">Buscas Avançadas</h2>
      
      <div class="search-grid">
        <!-- Busca por CPF -->
        <div class="search-card">
          <h3 class="search-title">Buscar Cliente por CPF</h3>
          <div class="search-form">
            <label for="cpf">CPF do Cliente:</label>
            <input type="text" id="cpf" maxlength="14" placeholder="Ex: 123.456.789-00" />
            <button id="btn-cpf" onclick="buscarClientePorCpf()">Buscar Cliente</button>
          </div>
        </div>
        
        <!-- Busca por ID de Produto -->
        <div class="search-card">
          <h3 class="search-title">Buscar Produto por ID</h3>
          <div class="search-form">
            <label for="id-produto">ID do Produto:</label>
            <input type="number" id="id-produto" placeholder="Ex: 1" />
            <button id="btn-id-produto" onclick="buscarProdutoPorId()">Buscar Produto</button>
          </div>
        </div>
      </div>
    </section>
    
    <!-- Seção de Resultados -->
    <section class="results-section">
      <div id="resultado"></div>
      <div id="erro" class="erro hidden"></div>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>

</html>
