<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuário - Sistema</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="cadastro-container">
    <div class="cadastro-card">
      <div class="cadastro-header">
        <h1>Cadastro de Usuário</h1>
        <p>Crie sua conta para acessar o sistema</p>
      </div>
      
      <form id="cadastro-form" onsubmit="cadastrarUsuario(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="nome-completo">Nome Completo</label>
            <input type="text" id="nome-completo" placeholder="Digite seu nome completo" required>
          </div>
          
          <div class="form-group">
            <label for="cpf-cadastro">Código</label>
            <input type="text" id="cpf-cadastro" placeholder="Digite seu código (mínimo 3 números)" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>
          
          <div class="form-group">
            <label for="senha-cadastro">Senha</label>
            <input type="password" id="senha-cadastro" placeholder="Mínimo 6 caracteres" required>
            <div class="password-strength">
              <div class="strength-bar"></div>
              <span class="strength-text">Força da senha</span>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="confirmar-senha">Confirmar Senha</label>
          <input type="password" id="confirmar-senha" placeholder="Digite a senha novamente" required>
        </div>
        
        <div class="terms-section">
          <label class="checkbox-container">
            <input type="checkbox" id="termos" required>
            <span class="checkmark"></span>
            Li e concordo com os <a href="#" class="terms-link">Termos de Uso</a> e <a href="#" class="terms-link">Política de Privacidade</a>
          </label>
        </div>
        
        <div class="form-buttons">
          <button type="button" class="btn-cancelar" onclick="voltarLogin()">Voltar</button>
          <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </div>
      </form>
      
      <div id="erro-cadastro" class="erro hidden"></div>
      <div id="sucesso-cadastro" class="sucesso hidden"></div>
    </div>
  </div>
  
  <script src="../js/cadastro-usuario.js"></script>
</body>
</html>
