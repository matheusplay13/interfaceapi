<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produto - Sistema</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="cadastro-container">
    <div class="cadastro-card">
      <div class="cadastro-header">
        <h1>Cadastro de Produto</h1>
        <p>Adicione um novo produto ao sistema</p>
      </div>
      
      <form id="cadastro-produto-form" onsubmit="cadastrarProduto(event)">
        <div class="form-group">
          <label for="id">ID do Produto *</label>
          <input type="text" id="id" placeholder="Digite o ID único do produto" required>
          <small id="id-error" class="error-text hidden">ID é obrigatório</small>
        </div>
        
        <div class="form-group">
          <label for="nome">Nome do Produto *</label>
          <input type="text" id="nome" placeholder="Digite o nome do produto" required>
          <small id="nome-error" class="error-text hidden">Nome é obrigatório</small>
        </div>
        
        <div class="form-group">
          <label for="valor">Valor (R$) *</label>
          <input type="number" id="valor" step="0.01" min="0.01" placeholder="Ex: 29.99" required>
          <small id="valor-error" class="error-text hidden">Valor deve ser maior que 0</small>
        </div>
        
        <div class="form-group">
          <label for="descricao">Descrição *</label>
          <textarea id="descricao" rows="4" placeholder="Descreva o produto em detalhes" required></textarea>
          <small id="descricao-error" class="error-text hidden">Descrição é obrigatória</small>
        </div>
        
        <div class="form-buttons">
          <button type="button" class="btn-cancelar" onclick="voltarParaDashboard()">Voltar</button>
          <button type="submit" class="btn-cadastrar" id="btn-salvar">Cadastrar Produto</button>
        </div>
      </form>
      
      <div id="erro-cadastro" class="erro hidden"></div>
      <div id="sucesso-cadastro" class="sucesso hidden"></div>
    </div>
  </div>
  
  <script src="../js/cadastro-produto.js"></script>
</body>
</html>
